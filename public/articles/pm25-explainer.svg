<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#eff6ff"/>
  <!-- hazy skyline -->
  <g opacity="0.5" fill="#93c5fd">
    <rect x="20" y="170" width="40" height="90"/>
    <rect x="70" y="140" width="30" height="120"/>
    <rect x="110" y="185" width="50" height="75"/>
    <rect x="330" y="160" width="35" height="100"/>
    <rect x="290" y="195" width="30" height="65"/>
  </g>
  <rect x="0" y="255" width="400" height="45" fill="#bfdbfe" opacity="0.6"/>
  <!-- haze layer -->
  <ellipse cx="200" cy="220" rx="220" ry="40" fill="#dbeafe" opacity="0.8"/>
  <!-- magnifier -->
  <circle cx="200" cy="120" r="70" fill="#ffffff" stroke="#2563eb" stroke-width="6"/>
  <line x1="248" y1="168" x2="285" y2="205" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>
  <!-- dust particles inside magnifier -->
  <circle cx="175" cy="100" r="9" fill="#f97316"/>
  <circle cx="210" cy="95" r="6" fill="#dc2626"/>
  <circle cx="225" cy="130" r="10" fill="#2563eb"/>
  <circle cx="185" cy="140" r="5" fill="#eab308"/>
  <circle cx="160" cy="125" r="4" fill="#7f1d1d"/>
  <!-- a single hair strand for scale -->
  <line x1="150" y1="70" x2="235" y2="160" stroke="#94a3b8" stroke-width="2"/>
</svg>
