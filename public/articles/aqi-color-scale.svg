    <path d="M60 220a140 140 0 0 1 28 -99" stroke="#22c55e"/>
    <path d="M88 121a140 140 0 0 1 68 -41" stroke="#eab308"/>
    <path d="M156 80a140 140 0 0 1 88 0" stroke="#f97316"/>
    <path d="M244 80a140 140 0 0 1 68 41" stroke="#dc2626"/>
    <path d="M312 121a140 140 0 0 1 28 99" stroke="#7c3aed"/>
